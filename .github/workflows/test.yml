name: test

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  safe-shell:
    name: safe-shell (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python -m pip install ruff pytest
      - run: ruff check skills/ tests/
      - run: python -m py_compile skills/safe-shell/safe_shell.py
      - run: python -m pytest tests/ -v
